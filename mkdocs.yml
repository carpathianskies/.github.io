site_name: Carpathian Skies Codex
site_description: An explorer's compendium of the world of Carpathian Skies
site_url: https://carpathianskies.github.io/
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Crimson Text
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Characters:
    - Overview: characters/index.md
    - The Project: characters/the-project.md
    - The Carpathia Crew: characters/crew.md
  - Lore:
    - Overview: lore/index.md
    - The World: lore/world.md
    - History & Factions: lore/factions.md
    - The Project's Nature: lore/the-project.md
  - Short Stories:
    - Overview: stories/index.md
    - Before the Project: stories/before-the-project.md
  - Locations:
    - Overview: locations/index.md
    - The Carpathia: locations/carpathia.md
    - The World Beyond: locations/world.md
  - Systems & Mechanics:
    - Overview: gameplay/index.md
    - Choice & Consequence: gameplay/choices.md
    - Relationships & Loyalty: gameplay/relationships.md
  - Media: media/gallery.md
